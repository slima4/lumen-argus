sonar.projectKey=slima4_lumen-argus
sonar.organization=slima4
sonar.python.version=3.9,3.10,3.11,3.12,3.13
sonar.sources=lumen_argus
sonar.tests=tests
sonar.exclusions=docs/**,landing.html,benchmark.py

# Suppress false positives in test files — test data contains fake
# secrets/credentials by design (this is a DLP tool that detects them).
# Both python: and pythonbugs:/secrets: prefixes covered for analyzer compat.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8
sonar.issue.ignore.multicriteria.e1.ruleKey=pythonbugs:S6466
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e3.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e4.ruleKey=secrets:S6706
sonar.issue.ignore.multicriteria.e4.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S6418
sonar.issue.ignore.multicriteria.e5.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e6.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.e6.resourceKey=**/tests/**
# SSL verification disable is intentional (opt-in via verify_ssl=False config flag)
sonar.issue.ignore.multicriteria.e7.ruleKey=python:S5527
sonar.issue.ignore.multicriteria.e7.resourceKey=lumen_argus/pool.py
sonar.issue.ignore.multicriteria.e8.ruleKey=python:S4423
