[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "lumen-argus-proxy"
version = "0.1.0"
description = "AI coding tool DLP proxy — scan outbound requests for secrets, PII, and proprietary data"
license = "MIT"
requires-python = ">=3.12"
authors = [
    {name = "lumen-argus contributors"},
]
keywords = ["dlp", "proxy", "ai", "security", "secrets", "pii"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    "lumen-argus-core",
    "pyyaml>=6.0.1",
    "aiohttp>=3.9",
    "pyahocorasick>=2.0",
]

[project.optional-dependencies]
# crossfire-rules 0.2.1 added the `parallel` parameter and switched the default
# multiprocessing context to spawn — both are required when calling
# CorpusGenerator from inside a background thread (which we do). Older versions
# would either deadlock on fork-from-thread or reject the parallel kwarg.
rules-analysis = ["crossfire-rules[re2]>=0.2.1"]

[project.scripts]
lumen-argus = "lumen_argus.cli:main"

[project.urls]
Homepage = "https://github.com/lumen-argus/lumen-argus"

[tool.setuptools.packages.find]
include = ["lumen_argus*"]

[tool.setuptools.package-data]
"lumen_argus" = ["py.typed"]
"lumen_argus.dashboard" = ["static/**/*"]
"lumen_argus.rules" = ["*.json"]

[tool.uv.sources]
lumen-argus-core = { workspace = true }
