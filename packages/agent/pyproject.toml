[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "lumen-argus-agent"
version = "0.1.0"
description = "Lightweight workstation agent for lumen-argus — detect, configure, and monitor AI coding tools"
license = "MIT"
requires-python = ">=3.12"
authors = [
    {name = "lumen-argus contributors"},
]
keywords = ["dlp", "ai", "security", "detection", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
]

dependencies = [
    "lumen-argus-core",
    "aiohttp>=3.9",
    "mitmproxy>=12.0",
]

[project.scripts]
lumen-argus-agent = "lumen_argus_agent.cli:main"
lumen-argus-uninstall = "lumen_argus_agent.uninstall:main"

[project.urls]
Homepage = "https://github.com/lumen-argus/lumen-argus"

[tool.uv.sources]
lumen-argus-core = { workspace = true }
