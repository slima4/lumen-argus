name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -v tests/

      - name: Verify CLI
        run: |
          python -m lumen_argus --version
          python -m lumen_argus --help

      - name: Verify pip install
        run: |
          pip install -e .
          lumen-argus --version

  benchmark:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run benchmark (smoke test)
        run: python benchmark.py -n 10 -p medium

  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lumen-argus:test .

      - name: Verify proxy and dashboard start
        run: |
          docker run -d --name argus-test -p 18080:8080 -p 18081:8081 lumen-argus:test
          sleep 3
          curl -sf http://localhost:18081/api/v1/status | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          assert d['status'] == 'operational'
          assert d['tier'] == 'community'
          print('OK: status=%s tier=%s version=%s' % (d['status'], d['tier'], d['version']))
          "
          docker stop argus-test
