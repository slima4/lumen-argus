name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only by default
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            proxy:
              - 'packages/proxy/**'
              - 'packages/core/**'
              - 'tests/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: "format --check"

  test-core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835c3c7f4a7d2c2bef6ef3eb6 # v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run core tests
        run: uv run --python ${{ matrix.python-version }} --package lumen-argus-core python -m unittest discover -v packages/core/tests/

  test-proxy:
    needs: changes
    if: needs.changes.outputs.proxy == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835c3c7f4a7d2c2bef6ef3eb6 # v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy tests
        run: uv run --python ${{ matrix.python-version }} --package lumen-argus-proxy python -m unittest discover -v tests/

      - name: Verify CLI
        run: |
          uv run --package lumen-argus-proxy lumen-argus --version
          uv run --package lumen-argus-proxy lumen-argus --help

  benchmark:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835c3c7f4a7d2c2bef6ef3eb6 # v5

      - name: Run benchmark (smoke test)
        run: uv run --package lumen-argus-proxy python benchmark.py -n 10 -p medium

  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: docker build -t lumen-argus:test .

      - name: Verify proxy and dashboard start
        run: |
          docker run -d --name argus-test -p 18080:8080 -p 18081:8081 lumen-argus:test
          sleep 3
          curl -sf http://localhost:18081/api/v1/status | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          assert d['status'] == 'operational'
          assert d['tier'] == 'community'
          print('OK: status=%s tier=%s version=%s' % (d['status'], d['tier'], d['version']))
          "
          docker stop argus-test
