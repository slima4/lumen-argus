name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only by default
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      agent: ${{ steps.filter.outputs.agent }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            agent:
              - 'packages/agent/**'
              - 'packages/core/**'
            proxy:
              - 'packages/proxy/**'
              - 'packages/core/**'
              - 'tests/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: "format --check"

  test-core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run core tests
        run: uv run --python ${{ matrix.python-version }} --package lumen-argus-core --group test python -m unittest discover -v packages/core/tests/

  test-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run agent tests
        run: uv run --python ${{ matrix.python-version }} --package lumen-argus-agent python -m unittest discover -v packages/agent/tests/

      - name: Verify agent CLI
        run: |
          uv run --package lumen-argus-agent lumen-argus-agent --version
          uv run --package lumen-argus-agent lumen-argus-agent detect --json | python -c "import sys,json; d=json.load(sys.stdin); assert 'clients' in d"

  test-proxy:
    needs: changes
    if: needs.changes.outputs.proxy == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run proxy tests
        run: uv run --python ${{ matrix.python-version }} --package lumen-argus-proxy python -m unittest discover -v tests/

      - name: Verify CLI
        run: |
          uv run --package lumen-argus-proxy lumen-argus --version
          uv run --package lumen-argus-proxy lumen-argus --help

  benchmark:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run benchmark (smoke test)
        run: uv run --package lumen-argus-proxy python benchmark.py -n 10 -p medium

  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t lumen-argus:test .

      - name: Verify proxy and dashboard start
        run: |
          docker run -d --name argus-test -p 18080:8080 -p 18081:8081 lumen-argus:test
          sleep 3
          curl -sf http://localhost:18081/api/v1/status | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          assert d['status'] == 'operational'
          assert d['tier'] == 'community'
          print('OK: status=%s tier=%s version=%s' % (d['status'], d['tier'], d['version']))
          "
          docker stop argus-test
