site_name: lumen-argus
site_description: AI coding tool DLP proxy — scan outbound requests for secrets, PII, and proprietary data
site_url: https://lumen-argus.github.io/lumen-argus/docs
repo_url: https://github.com/lumen-argus/lumen-argus
repo_name: lumen-argus/lumen-argus
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-lock
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lumen-argus/lumen-argus

copyright: Copyright &copy; 2026 Artem Senenko

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Proxy Server: guide/proxy.md
    - Client Detection & Setup: guide/client-detection.md
    - Detection: guide/detection.md
    - Allowlists: guide/allowlists.md
    - Custom Rules: guide/custom-rules.md
    - Rule Analysis: guide/rule-analysis.md
    - Scanning Files: guide/scan-cli.md
  - Operations:
    - Logging: operations/logging.md
    - Monitoring: operations/monitoring.md
    - Security: operations/security.md
  - Reference:
    - CLI: reference/cli.md
    - Config Schema: reference/config.md
    - API Endpoints: reference/api-endpoints.md
    - Architecture: reference/architecture.md
    - Exit Codes: reference/exit-codes.md
  - Development:
    - Extensions: development/extensions.md
    - Contributing: development/contributing.md
    - Changelog: development/changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
